[build]
  command = "bash scripts/netlify-build.sh"
  publish = "dist"

# CrowdyJS is cloned at build time (see scripts/netlify-build.sh).
# GraphQL schemas are vendored under vendor/schemas/ for codegen on Netlify.
# Fork deploys: set Site configuration → Environment variables (see README).
# VITE_ENV_HANDLE must match your devbox slug so mgmt proxy + game API align.
[build.environment]
  NODE_VERSION = "20"
  VITE_MANAGEMENT_API_URL = "/mgmt-api"
  VITE_MANAGEMENT_GRAPHQL_URL = "/mgmt-api/graphql"
  VITE_ENV_HANDLE = "e-7nan5854f07w"
  # Game API allows Netlify origins via CORS — direct URL avoids proxy failures under UDP load.
  VITE_GAME_API_HTTP_URL = "https://game.e-7nan5854f07w.dev.cks-env.com/graphql"
  VITE_GAME_API_WS_URL = "wss://game.e-7nan5854f07w.dev.cks-env.com/graphql"
  VITE_APP_ID = "1"
  VITE_ORG_ID = "1"

# /mgmt-api proxy is generated into public/_redirects at build time (game API is direct — see above).
# SPA fallback lives in public/_redirects — do not add [[redirects]] here; it can override API proxies.
