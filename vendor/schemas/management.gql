type Mutation {
  login(loginUserInput: LoginUserInput!): AuthResponse!
  register(registerUserInput: RegisterUserInput!): AuthResponse!
  confirmEmail(token: String!): Boolean!
  requestPasswordReset(email: String!): Boolean!
  resetPassword(resetPasswordInput: ResetPasswordInput!): Boolean!
  resendConfirmationEmail(email: String!): Boolean!
  logout: Boolean!
  changePassword(currentPassword: String!, newPassword: String!): Boolean!
  logoutAllDevices: Boolean!
  updateGamertag(input: UpdateGamertagInput!): User!
  setSuperAdmin(userId: BigInt!, value: Boolean!): User!

  """
  Super-admin only. Flip users.is_operator to grant or revoke control-plane / operator access.
  """
  setOperator(userId: BigInt!, value: Boolean!): User!
  setEarlyAccessOverride(userId: BigInt!, value: Boolean!): User!
  updateUserType(userId: BigInt!, value: String!): User!
  forceLogoutUser(userId: BigInt!): Boolean!

  """
  Soft-deletes the caller's account: anonymizes PII, revokes sessions. Wallet, voxel, and donation history stays intact via FK.
  """
  deleteMyAccount: Boolean!
  createOrganization(input: CreateOrganizationInput!): Organization!

  """Super admin only. Used to freeze/unfreeze orgs platform-wide."""
  setOrgStatus(orgId: BigInt!, status: String!): Organization!

  """
  Returns the plaintext token exactly once. Save it; subsequent queries only show metadata.
  """
  createOrgToken(input: CreateOrgTokenInput!): OrgTokenWithSecret!
  updateOrgToken(orgTokenId: BigInt!, input: UpdateOrgTokenInput!): OrgToken!
  revokeOrgToken(orgTokenId: BigInt!): Boolean!
  inviteOrgMember(input: InviteOrgMemberInput!): OrgMember!
  removeOrgMember(orgId: BigInt!, userId: BigInt!): Boolean!
  updateOrgMemberRoles(orgId: BigInt!, userId: BigInt!, roleIds: [BigInt!]!): OrgMember!
  createOrgRole(input: CreateOrgRoleInput!): OrgRole!
  updateOrgRole(orgRoleId: BigInt!, input: UpdateOrgRoleInput!): OrgRole!
  deleteOrgRole(orgRoleId: BigInt!): Boolean!
  createApp(input: CreateAppInput!): App!
  updateApp(appId: BigInt!, input: UpdateAppInput!): App!
  archiveApp(appId: BigInt!): App!

  """Super admin only. Used to take down or relist apps platform-wide."""
  setAppVisibility(appId: BigInt!, visibility: AppVisibility!): App!
  createAccessTier(input: CreateAccessTierInput!): AppAccessTier!
  updateAccessTier(tierId: BigInt!, input: UpdateAccessTierInput!): AppAccessTier!
  archiveAccessTier(tierId: BigInt!): AppAccessTier!
  grantAppAccess(input: GrantAppAccessInput!): AppUserAccess!
  revokeAppAccess(appId: BigInt!, userId: BigInt!): AppUserAccess!
  setAppBudget(orgId: BigInt!, appId: BigInt!, monthlyLimitCents: BigInt!): AppBudget!
  setQuota(input: SetQuotaInput!): ServiceQuota!
  deleteQuota(quotaId: BigInt!): Boolean!

  """
  Creates a Checkout row, opens the provider session, and returns the row with externalUrl set. Redirect the user to externalUrl. Status starts PENDING and updates via webhook.
  """
  createCheckout(input: CreateCheckoutInput!): Checkout!

  """
  Captures an approved PayPal order after the hosted checkout redirects back. Wallet credit still reconciles through PayPal webhooks.
  """
  capturePaypalCheckout(orderId: String!): Checkout!

  """
  Creates an environment only if each selected instance flavor is available and customer-priced in the catalog (same rule as environmentQuote). Use environmentFlavors / environmentDatacenters for valid options.
  """
  createEnvironment(input: CreateEnvironmentInput!): CksEnvironmentDetail!
  destroyEnvironment(input: DestroyEnvironmentInput!): CksEnvironmentChangeOrder!

  """
  Permanently deletes a destroyed environment record from the platform. Cloud resources must already be torn down via destroyEnvironment.
  """
  purgeEnvironment(input: PurgeEnvironmentInput!): Boolean!
  resumeEnvironment(input: ResumeEnvironmentInput!): CksEnvironmentChangeOrder!
  updateEnvironmentScaling(input: UpdateEnvironmentScalingInput!): CksEnvironmentChangeOrder!

  """
  Redeploys the environment to the latest available release version (or the configured default), reusing its current flavors/scaling and linked apps. Preserves the environment URLs. No-op-safe: re-running when already at latest still redeploys. If a prior deploy failed but stayed in_progress, it is abandoned first so the redeploy can proceed.
  """
  redeployEnvironment(input: RedeployEnvironmentInput!): CksEnvironmentChangeOrder!

  """
  SSH-restarts the Buddy systemd service on the active UDP runtime VM. Symptom relief when server_status heartbeat is stale; does not replace cks-udp-api pool fixes.
  """
  restartEnvironmentServices(input: RestartEnvironmentServicesInput!): CksEnvironmentChangeOrder!
  setEnvironmentDeletionProtection(environmentId: String!, enabled: Boolean!): Boolean!
  putCpSecret(environmentId: String!, name: String!, plaintext: String!, kind: String): CpSecretRow!
  deleteCpSecret(environmentId: String!, name: String!): Boolean!
  putCpEnvSecret(environmentId: String!, name: String!, plaintext: String!, kind: String): CpEnvSecretRow!
  ingestEnvironmentVersion(input: IngestEnvironmentVersionInput!): CpEnvironmentVersionRow!
  publishEnvironmentReleaseFromGameApiTag(input: PublishEnvironmentReleaseFromGameApiTagInput!): CpPublishEnvironmentReleaseResult!
  yankEnvironmentVersion(version: String!): Boolean!

  """
  Publish an app to the shared game-api environment. Free under the org quota; otherwise pass a planId for a paid subscription checkout.
  """
  publishAppToShared(appId: BigInt!, planId: BigInt, provider: PaymentProvider, successUrl: String, cancelUrl: String): PublishAppResult!
  cancelSharedSubscription(appId: BigInt!): AppSharedSubscription!

  """Set per-app hourly/daily spend caps (cents). Pass null to clear a cap."""
  setAppSpendCaps(appId: BigInt!, hourlyLimitCents: BigInt, dailyLimitCents: BigInt): AppRuntimeState!

  """
  Enable/disable off-session auto-billing. Pass limitCents=null for no limit.
  """
  setAutoBilling(orgId: BigInt!, enabled: Boolean!, limitCents: BigInt, rechargeAmountCents: BigInt, lowWaterThresholdCents: BigInt): OrgAutoBilling!

  """
  Begin vaulting a card for auto-billing. Returns a Stripe SetupIntent client secret for the browser to confirm.
  """
  setupSharedPaymentMethod(orgId: BigInt!): PaymentMethodSetup!
  removeSharedPaymentMethod(orgId: BigInt!, paymentMethodId: BigInt!): Boolean!
}

