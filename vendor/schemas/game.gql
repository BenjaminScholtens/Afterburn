  distance: Int!

  """Decay algorithm (0-5) from the original message."""
  decayRate: Int!

  """The unique identifier of the actor that was updated."""
  uuid: String!

  """
  The sequence number echoed back from the request, used to correlate responses.
  """
  sequenceNumber: Int!

